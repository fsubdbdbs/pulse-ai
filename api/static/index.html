<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0B0D14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pulse AI</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0B0D14;
      --surface:  #13161F;
      --surface2: #1A1E2C;
      --border:   #222636;
      --text:     #E2E6F4;
      --muted:    #5C6280;
      --sleep:    #A78BFA;
      --evening:  #34D399;
      --workout:  #FF9F1C;
      --danger:   #F87171;
      --radius:   16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screens ───────────────────────────────────────────────────── */
    .screen { display: none; height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── LOGIN ─────────────────────────────────────────────────────── */
    #screen-login {
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 32px;
    }

    .login-top { text-align: center; }

    .logo {
      font-size: 42px;
      font-weight: 200;
      letter-spacing: 8px;
      color: var(--text);
    }
    .tagline {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .pin-dots span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .pin-dots span.filled {
      background: var(--text);
      border-color: var(--text);
      transform: scale(1.1);
    }
    .pin-dots.shake {
      animation: shake 0.35s ease;
    }
    .pin-dots span.error {
      border-color: var(--danger);
      background: var(--danger);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 240px;
    }
    .pin-btn {
      height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-btn:active { background: var(--border); transform: scale(0.94); }
    .pin-btn.zero   { grid-column: 2; }
    .pin-btn.del    { grid-column: 3; font-size: 18px; }

    /* ── MAIN ───────────────────────────────────────────────────────── */
    #screen-main { overflow: hidden; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .logo-sm {
      font-size: 20px;
      font-weight: 200;
      letter-spacing: 5px;
      color: var(--text);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: var(--surface2); }
    .icon-btn.active { color: var(--sleep); }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      border: 1px solid var(--border);
    }
    .card-accent {
      width: 4px;
      flex-shrink: 0;
    }
    .card[data-type="sleep"]   .card-accent { background: var(--sleep); }
    .card[data-type="evening"] .card-accent { background: var(--evening); }
    .card[data-type="workout"] .card-accent { background: var(--workout); }
    .card[data-type="general"] .card-accent { background: var(--muted); }

    .card-body { padding: 14px 16px; flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .card[data-type="sleep"]   .badge { background: #A78BFA22; color: var(--sleep); }
    .card[data-type="evening"] .badge { background: #34D39922; color: var(--evening); }
    .card[data-type="workout"] .badge { background: #FF9F1C22; color: var(--workout); }
    .card[data-type="general"] .badge { background: #5C628022; color: var(--muted); }

    .card-time {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .card-content {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Courier New", monospace;
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      opacity: 0.9;
    }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 48px 24px;
      text-align: center;
    }
    .empty.visible { display: flex; }
    .empty-icon { font-size: 48px; margin-bottom: 8px; }
    .empty p { font-size: 15px; color: var(--muted); }
    .empty .hint { font-size: 13px; color: #3a3f58; }

    /* ── Toast ───────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 24px;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Loading dots ────────────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 6px;
    }
    .loading span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }
  </style>
</head>
<body>

<!-- ════════════════════ LOGIN ════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-top">
    <h1 class="logo">pulse</h1>
    <p class="tagline">twój osobisty analityk zdrowia</p>
  </div>

  <div class="pin-dots" id="pin-dots">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="pin-grid" id="pin-grid">
    <button class="pin-btn" data-d="1">1</button>
    <button class="pin-btn" data-d="2">2</button>
    <button class="pin-btn" data-d="3">3</button>
    <button class="pin-btn" data-d="4">4</button>
    <button class="pin-btn" data-d="5">5</button>
    <button class="pin-btn" data-d="6">6</button>
    <button class="pin-btn" data-d="7">7</button>
    <button class="pin-btn" data-d="8">8</button>
    <button class="pin-btn" data-d="9">9</button>
    <button class="pin-btn zero" data-d="0">0</button>
    <button class="pin-btn del" id="btn-del">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
        <line x1="18" y1="9" x2="13" y2="14"/><line x1="13" y1="9" x2="18" y2="14"/>
      </svg>
    </button>
  </div>
</div>

<!-- ════════════════════ MAIN ════════════════════ -->
<div id="screen-main" class="screen">
  <header class="top-bar">
    <span class="logo-sm">pulse</span>
    <button class="icon-btn" id="btn-notif" title="Powiadomienia push">
      <!-- bell icon, swaps to bell-off when subscribed -->
      <svg id="icon-bell" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <svg id="icon-bell-active" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
  </header>

  <div id="loading" class="loading">
    <span></span><span></span><span></span>
  </div>

  <div id="empty" class="empty">
    <div class="empty-icon">✦</div>
    <p>Brak wiadomości od Pulse AI</p>
    <p class="hint">Raporty pojawią się rano o 7:00,<br>wieczorem o 22:00 i po każdym treningu.</p>
  </div>

  <div id="feed" class="feed" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const TOKEN_KEY = "pulse_token";

const TYPE_LABELS = {
  sleep:   "Raport poranny",
  evening: "Wieczorne podsumowanie",
  workout: "Analiza treningu",
  general: "Wiadomość",
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

function formatTime(ts) {
  const d = new Date(typeof ts === "number" ? ts * 1000 : ts);
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1)   return "przed chwilą";
  if (diffH < 24)  return `${Math.floor(diffH)}h temu`;
  const dd = d.getDate().toString().padStart(2,"0");
  const mm = (d.getMonth()+1).toString().padStart(2,"0");
  const hh = d.getHours().toString().padStart(2,"0");
  const mn = d.getMinutes().toString().padStart(2,"0");
  return `${dd}.${mm} ${hh}:${mn}`;
}

function tokenExpired(token) {
  try {
    const p = token.split(".")[1];
    const pad = 4 - p.length % 4;
    const data = JSON.parse(atob(p.replace(/-/g,"+").replace(/_/g,"/") + "=".repeat(pad % 4)));
    return !data.exp || data.exp < Date.now() / 1000;
  } catch { return true; }
}

// ── Auth token ───────────────────────────────────────────────────────────────
function getToken() {
  const t = localStorage.getItem(TOKEN_KEY);
  if (!t || tokenExpired(t)) { localStorage.removeItem(TOKEN_KEY); return null; }
  return t;
}

function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }

// ── Screens ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

// ── PIN logic ────────────────────────────────────────────────────────────────
let pin = "";

function updateDots() {
  const dots = $("pin-dots").querySelectorAll("span");
  dots.forEach((d, i) => d.classList.toggle("filled", i < pin.length));
}

function pinError() {
  const dotsEl = $("pin-dots");
  dotsEl.querySelectorAll("span").forEach(s => s.classList.add("error"));
  dotsEl.classList.add("shake");
  setTimeout(() => {
    dotsEl.classList.remove("shake");
    dotsEl.querySelectorAll("span").forEach(s => s.classList.remove("error","filled"));
    pin = "";
  }, 600);
}

async function submitPin() {
  const resp = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pin }),
  });
  if (resp.ok) {
    const { token } = await resp.json();
    setToken(token);
    showScreen("screen-main");
    loadMessages();
  } else {
    pinError();
  }
  pin = "";
}

$("pin-grid").addEventListener("click", e => {
  const btn = e.target.closest(".pin-btn");
  if (!btn) return;
  if (btn.id === "btn-del") {
    pin = pin.slice(0, -1);
    updateDots();
    return;
  }
  const d = btn.dataset.d;
  if (d !== undefined && pin.length < 4) {
    pin += d;
    updateDots();
    if (pin.length === 4) submitPin();
  }
});

// ── Feed rendering ───────────────────────────────────────────────────────────
function renderMessages(msgs) {
  const feed    = $("feed");
  const loading = $("loading");
  const empty   = $("empty");

  loading.style.display = "none";

  if (!msgs || msgs.length === 0) {
    feed.style.display = "none";
    empty.classList.add("visible");
    return;
  }

  empty.classList.remove("visible");
  feed.style.display = "flex";
  feed.innerHTML = "";

  msgs.forEach(msg => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.type = msg.type || "general";

    const label = TYPE_LABELS[msg.type] || "Wiadomość";
    const time  = formatTime(msg.ts);

    card.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="badge">${label}</span>
          <span class="card-time">${time}</span>
        </div>
        <pre class="card-content">${escapeHtml(msg.content)}</pre>
      </div>`;
    feed.appendChild(card);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function loadMessages() {
  const token = getToken();
  if (!token) { showScreen("screen-login"); return; }

  $("loading").style.display = "flex";
  $("feed").style.display    = "none";
  $("empty").classList.remove("visible");

  try {
    const resp = await fetch("/api/messages", {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (resp.status === 401) { localStorage.removeItem(TOKEN_KEY); showScreen("screen-login"); return; }
    const msgs = await resp.json();
    renderMessages(msgs);
  } catch {
    showToast("Błąd połączenia — spróbuj ponownie");
    $("loading").style.display = "none";
    $("empty").classList.add("visible");
  }
}

// ── Push notifications ───────────────────────────────────────────────────────
let vapidPublicKey = null;

async function fetchVapidKey() {
  try {
    const r = await fetch("/api/config");
    const d = await r.json();
    vapidPublicKey = d.vapid_public_key || null;
  } catch {}
}

function urlBase64ToUint8Array(base64String) {
  const padding  = "=".repeat((4 - base64String.length % 4) % 4);
  const base64   = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData  = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribePush() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    showToast("Powiadomienia push nie są obsługiwane przez tę przeglądarkę");
    return;
  }
  if (!vapidPublicKey) {
    showToast("Brak klucza VAPID — sprawdź konfigurację");
    return;
  }

  const perm = await Notification.requestPermission();
  if (perm !== "granted") {
    showToast("Powiadomienia zablokowane przez system");
    return;
  }

  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
    });

    const token = getToken();
    const resp  = await fetch("/api/subscribe", {
      method:  "POST",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
      body:    JSON.stringify(sub.toJSON()),
    });
    if (resp.ok) {
      updateNotifButton(true);
      localStorage.setItem("pulse_push", "1");
      showToast("Powiadomienia włączone ✓");
    }
  } catch (err) {
    showToast("Nie udało się włączyć powiadomień");
    console.error(err);
  }
}

function updateNotifButton(active) {
  const btn = $("btn-notif");
  btn.classList.toggle("active", active);
  $("icon-bell").style.display        = active ? "none"  : "";
  $("icon-bell-active").style.display = active ? ""      : "none";
}

$("btn-notif").addEventListener("click", () => {
  if (localStorage.getItem("pulse_push")) {
    showToast("Powiadomienia już włączone");
  } else {
    subscribePush();
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  // Register SW
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(console.error);
  }

  await fetchVapidKey();

  const token = getToken();
  if (token) {
    showScreen("screen-main");
    loadMessages();
    if (localStorage.getItem("pulse_push")) {
      updateNotifButton(true);
    }
  }
  // else: login screen is shown by default
})();
</script>
</body>
</html>
