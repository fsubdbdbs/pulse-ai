<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0B0D14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pulse AI</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0B0D14;
      --surface:  #13161F;
      --surface2: #1A1E2C;
      --border:   #222636;
      --text:     #E2E6F4;
      --muted:    #5C6280;
      --sleep:    #A78BFA;
      --evening:  #34D399;
      --workout:  #FF9F1C;
      --radius:   16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .logo-sm {
      font-size: 20px;
      font-weight: 200;
      letter-spacing: 5px;
      color: var(--text);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: var(--surface2); }
    .icon-btn.active { color: var(--sleep); }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      border: 1px solid var(--border);
    }
    .card-accent { width: 4px; flex-shrink: 0; }
    .card[data-type="sleep"]   .card-accent { background: var(--sleep); }
    .card[data-type="evening"] .card-accent { background: var(--evening); }
    .card[data-type="workout"] .card-accent { background: var(--workout); }
    .card[data-type="general"] .card-accent { background: var(--muted); }

    .card-body { padding: 14px 16px; flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .card[data-type="sleep"]   .badge { background: #A78BFA22; color: var(--sleep); }
    .card[data-type="evening"] .badge { background: #34D39922; color: var(--evening); }
    .card[data-type="workout"] .badge { background: #FF9F1C22; color: var(--workout); }
    .card[data-type="general"] .badge { background: #5C628022; color: var(--muted); }

    .card-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    .card-content {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Courier New", monospace;
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      opacity: 0.9;
    }

    .empty {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 48px 24px;
      text-align: center;
    }
    .empty.visible { display: flex; }
    .empty-icon { font-size: 48px; margin-bottom: 8px; }
    .empty p { font-size: 15px; color: var(--muted); }
    .empty .hint { font-size: 13px; color: #3a3f58; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 24px;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 6px;
    }
    .loading span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="app">
  <header class="top-bar">
    <span class="logo-sm">pulse</span>
    <button class="icon-btn" id="btn-notif" title="Powiadomienia push">
      <svg id="icon-bell" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <svg id="icon-bell-active" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
  </header>

  <div id="loading" class="loading">
    <span></span><span></span><span></span>
  </div>

  <div id="empty" class="empty">
    <div class="empty-icon">✦</div>
    <p>Brak wiadomości od Pulse AI</p>
    <p class="hint">Raporty pojawią się rano o 7:00,<br>wieczorem o 22:00 i po każdym treningu.</p>
  </div>

  <div id="feed" class="feed" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const TYPE_LABELS = {
  sleep:   "Raport poranny",
  evening: "Wieczorne podsumowanie",
  workout: "Analiza treningu",
  general: "Wiadomość",
};

function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

function formatTime(ts) {
  const d = new Date(typeof ts === "number" ? ts * 1000 : ts);
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1)  return "przed chwilą";
  if (diffH < 24) return `${Math.floor(diffH)}h temu`;
  const dd = d.getDate().toString().padStart(2,"0");
  const mm = (d.getMonth()+1).toString().padStart(2,"0");
  const hh = d.getHours().toString().padStart(2,"0");
  const mn = d.getMinutes().toString().padStart(2,"0");
  return `${dd}.${mm} ${hh}:${mn}`;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMessages(msgs, isDemo = false) {
  $("loading").style.display = "none";
  if (!msgs || msgs.length === 0) {
    $("feed").style.display = "none";
    $("empty").classList.add("visible");
    return;
  }
  $("empty").classList.remove("visible");
  const feed = $("feed");
  feed.style.display = "flex";
  feed.innerHTML = "";

  if (isDemo) {
    const banner = document.createElement("div");
    banner.style.cssText = "font-size:11px;color:var(--muted);text-align:center;padding:4px 0 8px;letter-spacing:0.5px;text-transform:uppercase;";
    banner.textContent = "Przykładowe wiadomości — pojawią się po pierwszym treningu";
    feed.appendChild(banner);
  }

  msgs.forEach(msg => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.type = msg.type || "general";
    const label = TYPE_LABELS[msg.type] || "Wiadomość";
    card.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="badge">${label}</span>
          <span class="card-time">${formatTime(msg.ts)}</span>
        </div>
        <pre class="card-content">${escapeHtml(msg.content)}</pre>
      </div>`;
    feed.appendChild(card);
  });
}

const DEMO_MESSAGES = [
  {
    id: "demo1", type: "sleep", ts: Date.now() / 1000 - 3600 * 2,
    title: "Raport poranny",
    content: `RAPORT GOTOWOŚCI — 07.06.2026
━━━━━━━━━━━━━━━━━━━━━━━━━
WYNIK REGENERACJI: 78/100

SEN
• Czas: 7h 23min  (score: 82/100)
• Fazy: deep 94min | REM 87min | light 143min | awake 20min
• Zaśnięcie: 23:12

TĘTNO
• Spoczynkowe: 52 bpm
• HRV: 68 ms

GOTOWOŚĆ DNIA
Dobra noc, Franek. 7h 23min z wynikiem 82 to solidna regeneracja.
HRV 68ms jest powyżej twojej normy — układ nerwowy wypoczęty.
RHR 52 bpm potwierdza dobry stan.

REKOMENDACJA
Dzień na pełnej mocy — możesz trenować intensywnie.
Nawodnij się przed treningiem (min. 500ml przed).
━━━━━━━━━━━━━━━━━━━━━━━━━`
  },
  {
    id: "demo2", type: "workout", ts: Date.now() / 1000 - 3600 * 5,
    title: "Analiza treningu",
    content: `ANALIZA TRENINGU — Bieganie  07.06.2026
━━━━━━━━━━━━━━━━━━━━━━━━━
OBCIĄŻENIE
• Czas: 45min | Dystans: 7.2 km
• Tętno avg: 158 bpm | max: 176 bpm | Kalorie: 487 kcal

OCENA SESJI
Franek, solidna sesja aerobowa. Średnie tętno 158 bpm
utrzymane przez 45min to dobra praca w strefie cardio.
Tempo ~6:15/km jest dla ciebie komfortowe — widzę progres
względem poprzednich treningów.

REGENERACJA
36h do pełnej regeneracji mięśniowej. Jutro maksymalnie
spacer lub stretching. Zadbaj o białko (min. 30g) w ciągu
2h po treningu.
━━━━━━━━━━━━━━━━━━━━━━━━━`
  },
  {
    id: "demo3", type: "evening", ts: Date.now() / 1000 - 3600 * 14,
    title: "Wieczorne podsumowanie",
    content: `PODSUMOWANIE — 06.06.2026
━━━━━━━━━━━━━━━━━━━━━━━━━
AKTYWNOŚĆ
• Kroki: 9 243  (cel: 8 000) ✓
• Kalorie: 2 847 kcal
• AZM: 42 min

TRENING
Bieganie 45min — solidna sesja kardio. Tętno avg 158 bpm
świadczy o intensywności w strefie cardio. Dobrze.

REGENERACJA NA JUTRO
Po dzisiejszym treningu potrzebujesz ok. 24–36h regeneracji.
Jutro lżejszy dzień lub stretching. Zaśnij przed 23:00
i nadbij nawodnienie wieczorem.
━━━━━━━━━━━━━━━━━━━━━━━━━`
  }
];

async function loadMessages() {
  try {
    const resp = await fetch("/api/messages");
    const msgs = await resp.json();
    if (msgs && msgs.length > 0) {
      renderMessages(msgs);
    } else {
      renderMessages(DEMO_MESSAGES, true);
    }
  } catch {
    renderMessages(DEMO_MESSAGES, true);
  }
}

// Push notifications
let vapidPublicKey = null;

async function fetchVapidKey() {
  try {
    const r = await fetch("/api/config");
    const d = await r.json();
    vapidPublicKey = d.vapid_public_key || null;
  } catch {}
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64  = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribePush() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    showToast("Powiadomienia push nie są obsługiwane");
    return;
  }
  if (!vapidPublicKey) {
    showToast("Brak klucza VAPID — sprawdź konfigurację");
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== "granted") {
    showToast("Powiadomienia zablokowane przez system");
    return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
    });
    const resp = await fetch("/api/subscribe", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(sub.toJSON()),
    });
    if (resp.ok) {
      updateNotifButton(true);
      localStorage.setItem("pulse_push", "1");
      showToast("Powiadomienia włączone ✓");
    }
  } catch (err) {
    showToast("Nie udało się włączyć powiadomień");
    console.error(err);
  }
}

function updateNotifButton(active) {
  $("btn-notif").classList.toggle("active", active);
  $("icon-bell").style.display        = active ? "none" : "";
  $("icon-bell-active").style.display = active ? ""     : "none";
}

$("btn-notif").addEventListener("click", () => {
  if (localStorage.getItem("pulse_push")) {
    showToast("Powiadomienia już włączone");
  } else {
    subscribePush();
  }
});

// Boot
(async function boot() {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(console.error);
  }
  await fetchVapidKey();
  if (localStorage.getItem("pulse_push")) updateNotifButton(true);
  loadMessages();
})();
</script>
</body>
</html>
